spring:
  application:
    name: MealSubscription

  datasource :
    url : jdbc:mysql://localhost:3306/meal_db
    username: ${USER_NAME}
    password: ${PASSWORD}

  jackson:
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
